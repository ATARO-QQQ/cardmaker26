<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSBC Advanced Card Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700;900&family=Orbitron:wght@500;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <div id="sidebar" class="flex flex-col h-full bg-white border-r relative z-30">
        <div class="p-4 bg-slate-900 text-white flex justify-between items-center">
            <h1 class="text-base font-bold font-['Orbitron'] tracking-wider">YSBC CARD SYSTEM</h1>
            <div id="auth-status" class="text-xs text-gray-400">Loading...</div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-5 pb-8">
            
            <form id="card-form" class="space-y-3.5">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider border-b pb-1">カード編集</h2>
                
                <div class="grid grid-cols-2 gap-2.5">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">氏名</label>
                        <input type="text" id="in-name" value="中尾 汐里" class="w-full text-sm p-1.5 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">ローマ字</label>
                        <input type="text" id="in-spell" value="Shiori Nakao" class="w-full text-sm p-1.5 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2.5">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">学年 (基調色)</label>
                        <select id="in-grade" class="w-full text-sm p-1.5 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="high3">高3 (橙)</option>
                            <option value="high2" selected>高2 (黄)</option>
                            <option value="high1">高1 (赤)</option>
                            <option value="mid3">中3 (青)</option>
                            <option value="mid2">中2 (緑)</option>
                            <option value="mid1">中1 (紫)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">クラス・番号</label>
                        <input type="text" id="in-class" value="2年B組 21番" class="w-full text-sm p-1.5 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2.5">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">生年月日</label>
                        <input type="text" id="in-birth" value="2011年10月15日生" class="w-full text-sm p-1.5 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">役職 (空欄で一般)</label>
                        <input type="text" id="in-role" value="人事" placeholder="例: 部長" class="w-full text-sm p-1.5 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2.5">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">スポット</label>
                        <select id="in-spot" class="w-full text-sm p-1.5 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="調光">調光</option>
                            <option value="センター" selected>センター</option>
                            <option value="Ａ">Ａ</option>
                            <option value="Ｂ">Ｂ</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">分野ロゴ</label>
                        <select id="in-field" class="w-full text-sm p-1.5 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="照明">舞台照明</option>
                            <option value="放送">情報放送</option>
                            <option value="朗読">朗読</option>
                            <option value="アナウンス" selected>アナウンス</option>
                            <option value="映像">映像制作</option>
                            <option value="音声">音声製作</option>
                        </select>
                    </div>
                </div>
            </form>

            
            <div class="flex space-x-2 pt-2 border-t mt-4">
                <button onclick="window.addToPrint()" class="flex-[3] bg-blue-600 text-white text-xs font-bold py-2.5 rounded hover:bg-blue-700 transition flex items-center justify-center shadow-sm">
                    <i class="fas fa-plus mr-1.5"></i> 印刷シートへ(1枚)
                </button>
                <button onclick="window.fillPrint()" class="flex-[2] bg-blue-50 text-blue-700 border border-blue-200 text-xs font-bold py-2.5 rounded hover:bg-blue-100 transition flex items-center justify-center shadow-sm" title="残りの空き枠をすべて埋める">
                    <i class="fas fa-clone mr-1.5"></i> 残りを埋める
                </button>
            </div>

            
            <div class="flex space-x-2 pt-2">
                <button id="btn-save" class="flex-[3] bg-slate-800 text-white text-xs font-bold py-2.5 rounded hover:bg-slate-700 transition flex items-center justify-center shadow-sm">
                    <i class="fas fa-cloud-upload-alt mr-1.5"></i> 保存 (最大5データ)
                </button>
                <button id="btn-clear" class="flex-[2] bg-slate-100 text-slate-700 text-xs font-bold py-2.5 rounded hover:bg-slate-200 transition shadow-sm border border-slate-200">
                    エディタクリア
                </button>
            </div>

            
            <div class="pt-4">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider border-b pb-1 mb-2">保存されたデータ (<span id="save-count">0</span>/5)</h2>
                <div id="saved-list" class="space-y-1.5">
                    <div class="text-xs text-gray-400 italic py-1">データはありません</div>
                </div>
            </div>
        </div>
    </div>

    
    <div id="preview-area" class="relative">
        
        <div id="print-btn-container" class="flex flex-col items-end">
            <button onclick="window.print()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-lg shadow-xl hover:bg-indigo-700 transition font-bold text-sm flex items-center">
                <i class="fas fa-print mr-2"></i> A4印刷する
            </button>
            <button onclick="window.clearPrintQueue()" class="mt-3 bg-red-50 text-red-600 px-3 py-1.5 rounded shadow text-xs font-bold hover:bg-red-100 transition border border-red-200 flex items-center">
                <i class="fas fa-trash-alt mr-1.5"></i> シートを空にする
            </button>
            <p class="text-[11px] text-center mt-2 text-slate-600 bg-white/90 px-2 py-0.5 rounded shadow-sm border">※印刷設定: 倍率100% / 用紙A4</p>
        </div>

        
        <div class="mb-10 flex flex-col items-center print-hidden w-full max-w-2xl">
            <h3 class="text-slate-500 font-bold text-sm mb-3 tracking-widest uppercase"><i class="fas fa-edit mr-1"></i>現在編集中のデザイン</h3>
            <div id="single-preview" class="shadow-[0_10px_25px_rgba(0,0,0,0.15)] rounded-sm overflow-hidden border border-slate-200">
                
            </div>
        </div>

        
        <div class="flex flex-col items-center w-full max-w-3xl">
            <h3 class="text-slate-500 font-bold text-sm mb-3 tracking-widest uppercase print-hidden"><i class="fas fa-file-alt mr-1"></i>A4 印刷シート</h3>
            <div class="a4-sheet" id="a4-container">
                
            </div>
        </div>
    </div>

    
    <div id="auth-modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 text-slate-800">
            <div class="text-center mb-6">
                <div class="w-12 h-12 bg-slate-900 text-white rounded-full flex items-center justify-center mx-auto mb-3 font-['Orbitron'] font-bold text-lg">
                    YS
                </div>
                <h2 class="text-lg font-bold font-['Orbitron'] tracking-wider text-slate-900">YSBC CARD SYSTEM</h2>
                <p class="text-xs text-slate-500 mt-1">ご利用にはログインが必要です</p>
            </div>

            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-700 mb-1">メールアドレス</label>
                    <input type="email" id="auth-email" required placeholder="user@example.com" class="w-full text-sm p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-700 mb-1">パスワード</label>
                    <input type="password" id="auth-password" required minlength="6" placeholder="******" class="w-full text-sm p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>

                <div class="pt-2 space-y-2">
                    <button type="submit" id="btn-login" class="w-full bg-indigo-600 text-white text-xs font-bold py-3 rounded hover:bg-indigo-700 transition flex items-center justify-center shadow">
                        <i class="fas fa-sign-in-alt mr-2"></i> ログイン
                    </button>
                    <button type="button" id="btn-register" class="w-full bg-slate-100 text-slate-700 text-xs font-bold py-2.5 rounded hover:bg-slate-200 transition border border-slate-200">
                        新規アカウント作成
                    </button>
                </div>
            </form>
            <p id="auth-error-msg" class="text-xs text-red-500 mt-3 text-center hidden"></p>
        </div>
    </div>

    
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 z-50 flex items-center justify-center hidden">
        <div class="text-center">
            <i class="fas fa-circle-notch fa-spin text-3xl text-slate-800 mb-2"></i>
            <p class="text-xs font-bold text-slate-800" id="loading-text">処理中...</p>
        </div>
    </div>

    
    <script type="module" src="script.js"></script>
</body>
</html>
